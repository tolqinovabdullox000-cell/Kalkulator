<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css">
    <title>Kalkulyator</title>
  </head>
  <body>
    <div class="container">
      <h1>Kalkulyator !!</h1>
      <form id="login">
        <input type="number" id="son1" placeholder="1-sonni kiriting" />
        <input type="number" id="son2" placeholder="2-sonni kiriting" />
        <br /><br />

        <button type="button" onclick="hisobla('+')">+</button>
        <button type="button" onclick="hisobla('-')">-</button>
        <button type="button" onclick="hisobla('*')">*</button>
        <button type="button" onclick="hisobla('/')">/</button>
        <button type="button" onclick="hisobla('%')">%</button>
      </form>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
